name: cody-build
on:
  repository_dispatch:
    types: [cody-build]
permissions:
  contents: write
  pull-requests: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ github.event.client_payload.task }}
          allowed_tools: "Bash(git:*),Bash(gh:*),Bash(pnpm:*),View,GlobTool,GrepTool,Edit,Write"
          claude_env: |
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
